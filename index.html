<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Church Directory</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.directory{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
padding:22px;
border-radius:14px;
box-shadow:0 4px 14px rgba(0,0,0,.1);
text-align:center;
cursor:pointer;
transition:transform .15s ease, box-shadow .15s ease;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.card img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:12px;
}

.profile{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
}

.profile-box{
background:white;
padding:30px;
border-radius:12px;
width:380px;
text-align:center;
}

.profile-box img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

.close{
margin-top:15px;
cursor:pointer;
color:blue;
}

@media (max-width: 600px){

.directory{
grid-template-columns:1fr;
gap:16px;
padding:10px;
}

.card{
padding:18px;
}

.card img{
width:110px;
height:110px;
}

}

@media (max-width:600px){

.profile{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:white;
display:none;
overflow-y:auto;
z-index:1000;
}

.profile-box{
width:100%;
max-width:none;
height:auto;
border-radius:0;
padding:25px;
text-align:center;
box-shadow:none;
}

.profile-box img{
width:160px;
height:160px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
}

.close{
font-size:18px;
margin-top:25px;
}

}
  
</style>
</head>

<body>

<h1>Church Directory</h1>

<div class="directory" id="directory"></div>

<div class="profile" id="profile">
<div class="profile-box" id="profileContent"></div>
</div>

<script>

async function loadMembers(){

const response = await fetch("/.netlify/functions/members")
const data = await response.json()

const directory = document.getElementById("directory")

data.records.forEach(record=>{

const f = record.fields

const photo = f.Photo?.[0]?.url || ""
const name = f["Full Name"] || ""
const ministry = f.Ministry || ""
const phone = formatPhone(f["Phone Number"])
const email = f.Email || ""

const address =
`${f.Address || ""}<br>
${f.City || ""}, ${f.State || ""} ${f["Zip Code"] || ""}`

const birthday = formatMonthDay(f.Birthday)
const anniversary = formatMonthDay(f.Anniversary)
const household = f.Household || ""
const updated = formatDate(f["Last Updated"])

const card = document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${photo}">
<h3>${name}</h3>
<p>${phone}</p>
`

card.onclick=()=>showProfile(name,photo,ministry,phone,email,address,birthday,anniversary,household,updated)

directory.appendChild(card)

})

}

function showProfile(name,photo,ministry,phone,email,address,birthday,anniversary,household,updated){

const box = document.getElementById("profileContent")

box.innerHTML=`

<img src="${photo}">
<h2>${name}</h2>

${ministry ? `<p><strong>${ministry}</strong></p>` : ""}

<p><a href="tel:${phone}">${phone}</a></p>
<p>${email}</p>
<p>${address}</p>

${birthday ? `<p><strong>Birthday:</strong> ${birthday}</p>` : ""}

${anniversary ? `<p><strong>Anniversary:</strong> ${anniversary}</p>` : ""}

${household ? `<p><strong>Household:</strong> <span style="color:blue;cursor:pointer">${household}</span></p>` : ""}

${updated ? `<p style="font-size:12px;color:#666">Updated ${updated}</p>` : ""}

<div class="close" onclick="closeProfile()">Close</div>

`

document.getElementById("profile").style.display="flex"

}

function closeProfile(){
document.getElementById("profile").style.display="none"
}

function formatPhone(phone){

if(!phone) return ""

const digits = phone.replace(/\D/g,'')

if(digits.length !== 10) return phone

return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`
}

function formatDate(dateString){

if(!dateString) return ""

const d = new Date(dateString)

return d.toLocaleDateString("en-US",{
year:"numeric",
month:"long",
day:"numeric"
})

}

function formatMonthDay(dateString){

if(!dateString) return ""

const d = new Date(dateString)

return d.toLocaleDateString("en-US",{
month:"long",
day:"numeric"
})

}

loadMembers()

</script>

</body>
</html>
