<style>

/* ================================= */
/* GLOBAL STYLES                     */
/* ================================= */

body{
font-family:"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
font-feature-settings:"cv11","ss01";
background:linear-gradient(
180deg,
#0d4e6a 0%,
#0e6a8e 50%,
#00a3da 100%
);
margin:0;
padding:0;
min-height:100vh;
overflow-x:hidden;
}

font-family:"Inter";
src:url("assets/fonts/Inter-VariableFont_opsz,wght.woff2") format("woff2");
font-weight:100 900;
font-style:normal;
font-display:swap;
}
   
a,
a:visited,
a:active{

}

a:hover{

}

h1{

/* ================================= */
/* HEADER                            */
/* ================================= */

.header{

top:0;
background:black;
z-index:100;

/* ================================= */

.directory-toolbar{
max-width:1200px;
margin:0 auto;
padding:10px 20px 12px 20px;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
gap:12px;
background:#000;
border-top:1px solid rgba(255,255,255,.12);

.pending-changes-count{

min-width:0;
color:rgba(255,255,255,.92);
font-size:14px;
line-height:1.35;

}

.directory-toolbar-actions{
display:flex;
flex-wrap:wrap;
gap:12px;
align-items:center;
justify-content:flex-end;

.directory-toolbar button{

background:rgba(255,255,255,.12);

border-radius:8px;

cursor:pointer;
}

.directory-toolbar button:hover{

}

/* ================================= */
/* EDITOR MODE (in header)           */
/* ================================= */

.editor-banner{
display:none;
max-width:1200px;
margin:0 auto;
padding:10px 20px;
text-align:center;
font-weight:600;
font-size:15px;
color:#f0e6a8;
border-top:1px solid rgba(255,255,255,.12);

}

.admin-panel{

max-width:1200px;
margin:0 auto;
padding:0 20px 14px 20px;
flex-direction:row;
flex-wrap:wrap;
gap:12px;
justify-content:center;
align-items:center;
border-top:1px solid rgba(255,255,255,.08);
box-sizing:border-box;
}

.admin-panel button{
font:inherit;
background:rgba(255,255,255,.12);
color:#fff;
border:1px solid rgba(255,255,255,.35);
border-radius:8px;
padding:8px 14px;
cursor:pointer;
}

.admin-panel button:hover{
background:rgba(255,255,255,.2);
}

/* ================================= */
/* SEARCH BAR                        */
/* ================================= */

.search-bar{
max-width:600px;
margin:10px auto 20px auto;
padding:0 12px 14px 12px;
}

.search-bar input{
width:100%;

padding:14px 16px;
font-size:16px;

border:none;
outline:none;

}

.search-bar input:focus{

box-shadow:0 4px 12px rgba(0,0,0,.1);

/* ================================= */
/* DIRECTORY GRID (DESKTOP)          */
/* ================================= */

.directory{
display:grid;
grid-template-columns:repeat(auto-fill,260px);
gap:32px;
padding:0 16px;
max-width:1200px;
width:100%;
margin:auto;

/* ================================= */
/* MEMBER CARD                       */
/* ================================= */

.card{
position:relative;
cursor:pointer;
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.25);
transition:transform .15s ease, box-shadow .15s ease;
}

.card:hover{

}

.card img{
width:100%;
height:260px;
object-fit:cover;

}

/* ================================= */
/* CARD TEXT OVERLAY                 */
/* ================================= */

.card-info{
position:absolute;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,.65);
color:white;
padding:10px 14px;

justify-content:space-between;

.card-info h3{

}

.card-info p{

font-size:13px;

/* ================================= */
/* PROFILE POPUP (DESKTOP)           */

.profile{
position:fixed;
left:0;
right:0;
bottom:0;

background:rgba(0,0,0,.5);

justify-content:center;

body.profile-open{

width:100%;
max-width:560px;
max-height:85vh;

border-radius:20px 20px 0 0;

align-items:stretch;

}

/* Hide scrollbar (Chrome, Safari) */
.profile-box::-webkit-scrollbar {
  display: none;
}

/* Hide scrollbar (Firefox) */
.profile-box {
  scrollbar-width: none;
}

#profileContent{
display:flex;
flex-direction:column;
align-items:center;
width:100%;
}

width:180px;
height:180px;

display:block;
margin:0 auto 18px auto;

font-size:26px;
font-weight:600;
margin:12px 0 16px 0;

width:100%;

width:100%;

<!-- ================================= -->

<script type="module">

/* Import Firebase */

import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const { auth, db, authReady } = window.firebase;

/* Import Firebase storage */

import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const storage = getStorage(window.firebase.app);

/* ================================= */
/* PROFILE IMAGES — COMPRESS (JPEG)  */
/* ================================= */

const PROFILE_IMAGE_MAX_FILE_BYTES = 10 * 1024 * 1024;
const PROFILE_IMAGE_MAX_WIDTH = 800;
const PROFILE_IMAGE_JPEG_QUALITY = 0.7;

function fileToDataUrl(file){

  return new Promise((resolve, reject) => {

    const r = new FileReader();

    r.onload = () => resolve(r.result);
    r.onerror = () => reject(r.error);
    r.readAsDataURL(file);

  });

}

function loadHtmlImage(src){

  return new Promise((resolve, reject) => {

    const im = new Image();

    im.onload = () => resolve(im);
    im.onerror = () => reject(new Error("Could not load image"));
    im.src = src;

  });

}

async function compressImageFileToJpegBlob(file, options = {}){

  const maxWidth = options.maxWidth ?? PROFILE_IMAGE_MAX_WIDTH;
  const quality = options.quality ?? PROFILE_IMAGE_JPEG_QUALITY;

  let source;
  let bitmap = null;

  if(typeof createImageBitmap === "function"){

    try{

      bitmap = await createImageBitmap(file);
      source = bitmap;

    }catch{

      const dataUrl = await fileToDataUrl(file);
      source = await loadHtmlImage(dataUrl);

    }

  }else{

    const dataUrl = await fileToDataUrl(file);
    source = await loadHtmlImage(dataUrl);

  }

  const sw = source.width || source.naturalWidth;
  const sh = source.height || source.naturalHeight;

  let tw = sw;
  let th = sh;

  if(sw > maxWidth){

    tw = maxWidth;
    th = Math.round((sh * maxWidth) / sw);

  }

  const canvas = document.createElement("canvas");
  canvas.width = tw;
  canvas.height = th;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(source, 0, 0, tw, th);

  if(bitmap && bitmap.close){
    bitmap.close();
  }

  return new Promise((resolve, reject) => {

    canvas.toBlob(
      blob => {
        if(blob){
          resolve(blob);
        }else{
          reject(new Error("Could not compress image"));
        }
      },
      "image/jpeg",
      quality
    );

  });

}

function clearOnboardingPhotoPreviewState(){

  if(window.__onboardingPreviewUrl){

    URL.revokeObjectURL(window.__onboardingPreviewUrl);
    window.__onboardingPreviewUrl = null;

  }

  window.__onboardingPhotoJpegBlob = null;

}

async function onOnboardPhotoInputChange(){

  const input = document.getElementById("onboardPhoto");
  const preview = document.getElementById("onboardPhotoPreview");
  const previewImg = document.getElementById("onboardPhotoPreviewImg");

  clearOnboardingPhotoPreviewState();

  if(!input || !preview || !previewImg){
    return;
  }

  const file = input.files && input.files[0] ? input.files[0] : null;

  if(!file){

    preview.style.display = "none";
    previewImg.removeAttribute("src");
    return;

  }

  if(file.size > PROFILE_IMAGE_MAX_FILE_BYTES){

    alert("Please choose an image of 10 MB or smaller.");
    input.value = "";
    return;

  }

  try{

    const blob = await compressImageFileToJpegBlob(file);
    window.__onboardingPhotoJpegBlob = blob;

    const url = URL.createObjectURL(blob);
    window.__onboardingPreviewUrl = url;

    previewImg.src = url;
    previewImg.alt = "Compressed profile photo preview";
    preview.style.display = "block";

  }catch(err){

    console.error(err);
    alert("Could not process that image. Try a JPEG or PNG.");
    input.value = "";

  }

}

/* ================================= */
/* LOGIN AUTH GATING                 */
/* ================================= */
   
async function isUserAllowed(email){

  const { getDoc, doc } = await import(
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
  );

  const cleanEmail = email.toLowerCase().trim();

  const userDoc = await getDoc(doc(db, "allowedUsers", cleanEmail));

  return userDoc.exists();

}

/* ================================= */
/* USER EMAIL CHECK                  */

async function getMemberProfileByEmail(email){

  const { getDocs, collection } = await import(
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
  );

  const snapshot = await getDocs(collection(db, "members"));

  const match = snapshot.docs.find(doc => {
    const data = doc.data();
    return (data.email || "").toLowerCase().trim() === email;
  });

  return match ? { id: match.id, ...match.data() } : null;

}

/* ================================= */
/* PENDING ONBOARDING (awaiting approval) */
/* ================================= */

async function hasPendingOnboardingSubmission(userEmail){

  const clean = (userEmail || "").toLowerCase().trim();

  const { getDocs, collection, query, where } = await import(
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
  );

  const variants = [...new Set([clean, userEmail].filter(Boolean))];

  for(const candidate of variants){

    const snapshot = await getDocs(query(
      collection(db, "pendingChanges"),
      where("submittedBy", "==", candidate)
    ));

    const found = snapshot.docs.some(doc => {
      const data = doc.data();
      if(data.status !== "pending") return false;
      const ch = data.changes;
      return ch && ch.onboarding === true;
    });

    if(found) return true;

  }

  return false;

}

/* ================================= */
/* MINISTRY / ROLE (pending payload) */
/* ================================= */

const ONBOARDING_ROLE_OPTIONS = new Set([
  "Admin",
  "Sound",
  "Security",
  "Volunteer"
]);

function splitMinistryAndRole(selectedValue){

  const v = (selectedValue || "").trim();

  if(!v){
    return { ministry: "", role: "" };
  }

  if(ONBOARDING_ROLE_OPTIONS.has(v)){
    return { ministry: "", role: v };
  }

  return { ministry: v, role: "" };

}

function ministryStringToSelectValue(stored){

  const raw = (stored || "").trim();

  if(!raw){
    return "";
  }

  const parts = raw.split(/\s*·\s*/).map(p => p.trim()).filter(Boolean);

  if(parts.length === 2){

    const [a, b] = parts;

    if(ONBOARDING_ROLE_OPTIONS.has(b)){
      return b;
    }

    if(ONBOARDING_ROLE_OPTIONS.has(a)){
      return a;
    }

    return a;

  }

  if(parts.length === 1){

    return parts[0];

  }

  return raw;

}

function omitUndefined(obj){

  return Object.fromEntries(
    Object.entries(obj).filter(([, val]) => val !== undefined)
  );

}

/* ================================= */
/* MEMBER PENDING CHANGES SUBMISSION */
/* ================================= */
   
async function submitPendingChange(memberId, changes, opts = {}){

  try {

    const { addDoc, collection, serverTimestamp } = await import(
      "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
    );

    const changesPayload = omitUndefined(changes);

    await addDoc(collection(db, "pendingChanges"), {
      memberId: memberId != null ? memberId : null,
      submittedBy: window.currentUser.email.toLowerCase().trim(),
      status: "pending",
      createdAt: serverTimestamp(),
      resolvedAt: null,
      resolvedBy: null,
      changes: changesPayload
    });

    if(opts.isOnboarding){
      alert(
        "Your profile details were successfully saved.\n\n" +
        "Onboarding is complete. An Impact Church admin will review your profile soon..."
      );
    }else{
      alert("Changes submitted for approval");
    }

  } catch (err) {
    console.error("Failed to submit change:", err);
    throw err;
  }

}

/* ================================= */
   
async function submitOnboarding(){

  const firstName = (document.getElementById("onboardFirstName").value || "").trim();
  const lastName = (document.getElementById("onboardLastName").value || "").trim();
  const { ministry, role } = splitMinistryAndRole(
    document.getElementById("onboardMinistry").value
  );
  const phone = (document.getElementById("onboardPhone").value || "").trim();
  const address = (document.getElementById("onboardAddress").value || "").trim();
  const city = (document.getElementById("onboardCity").value || "").trim();
  const state = (document.getElementById("onboardState").value || "").trim();
  const zip = (document.getElementById("onboardZip").value || "").trim();
  const birthday = (document.getElementById("onboardBirthday").value || "").trim();
  const anniversary = (document.getElementById("onboardAnniversary").value || "").trim();

  const email = (window.currentUser && window.currentUser.email)
    ? window.currentUser.email.toLowerCase().trim()
    : "";

  if (!email) {
    alert("You must be signed in to save your profile.");
    return;
  }

  if (!firstName || !lastName) {
    alert("Please enter your first and last name.");
    return;
  }

  const btn = document.getElementById("onboardSubmitBtn");
  if (btn) {
    btn.disabled = true;
    btn.textContent = "Saving…";
  }

  try {

    const photoInput = document.getElementById("onboardPhoto");
    const file = photoInput && photoInput.files && photoInput.files[0]
      ? photoInput.files[0]
      : null;

    if(file && file.size > PROFILE_IMAGE_MAX_FILE_BYTES){
      alert("Please choose an image of 10 MB or smaller.");
      if(btn){
        btn.disabled = false;
        btn.textContent = "Submit profile";
      }
      return;
    }

    let photoURL = "";

    let jpegBlob = window.__onboardingPhotoJpegBlob || null;

    if(file && !jpegBlob){
      btn.textContent = "Preparing photo…";
      try{
        jpegBlob = await compressImageFileToJpegBlob(file);
        window.__onboardingPhotoJpegBlob = jpegBlob;
      }catch(compErr){
        console.error(compErr);
        alert("Could not process the photo. Try another image.");
        if(btn){
          btn.disabled = false;
          btn.textContent = "Submit profile";
        }
        return;
      }
    }

    if(jpegBlob){

      btn.textContent = "Uploading photo…";

      const uid = window.currentUser.uid
        || window.currentUser.email.replace(/[^a-zA-Z0-9]+/g, "_");

      const path = `profilePhotos/pending/${uid}/${Date.now()}_profile.jpg`;
      const storageRef = ref(storage, path);

      await uploadBytes(storageRef, jpegBlob, { contentType: "image/jpeg" });
      photoURL = await getDownloadURL(storageRef);

    }

    const pendingPayload = {
      firstName,
      lastName,
      fullName: `${firstName} ${lastName}`,
      ministry,
      role,
      email,
      phone,
      address,
      city,
      state,
      zip,
      birthday,
      anniversary,
      onboarding: true
    };

    if(photoURL){
      pendingPayload.photoURL = photoURL;
    }

    await submitPendingChange(null, pendingPayload, { isOnboarding: true });

    location.reload();

  } catch (err) {
    console.error("Onboarding submit failed:", err);
    alert("Could not submit your profile for approval. Please try again.");
    if (btn) {
      btn.disabled = false;
      btn.textContent = "Submit profile";
    }
  }

}

    if (!allowed) {
      alert("You are not authorized to access this directory.");
      await signOut(auth);
      return;
    }

    window.currentUser = user;
    const profile = await getMemberProfileByEmail(email);
    const onboardingPending = await hasPendingOnboardingSubmission(user.email);

  } else {

let pendingChangesCountUnsub = null;

function stopPendingChangesCountListener(){

if(typeof pendingChangesCountUnsub === "function"){
pendingChangesCountUnsub();
pendingChangesCountUnsub = null;
}

}

function setPendingChangesCountText(n){

const textEl = document.getElementById("pendingChangesCountText");
const wrap = document.getElementById("pendingChangesCountWrap");

if(!textEl || !wrap){
return;
}

if(!window.isChurchAdmin){
wrap.style.display = "none";
return;
}

if(n === 1){
textEl.textContent = "There is 1 pending change request.";
}else{
textEl.textContent = `There are ${n} pending change requests.`;
}

wrap.style.display = "block";

}

async function startPendingChangesCountListener(){

stopPendingChangesCountListener();

const wrap = document.getElementById("pendingChangesCountWrap");

if(!wrap){
return;
}

if(!window.isChurchAdmin){
wrap.style.display = "none";
return;
}

const { onSnapshot, collection } = await import(
"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
);

pendingChangesCountUnsub = onSnapshot(
collection(db, "pendingChanges"),
(snapshot) => {

let n = 0;

snapshot.forEach((docSnap) => {

if(docSnap.data().status === "pending"){
n++;
}

});

setPendingChangesCountText(n);

},
(err) => {
console.error("pendingChanges listener:", err);
}
);

}

/* ================================= */
/* DELETE MEMBER (ADMIN)             */
/* ================================= */

async function deleteMemberFromDirectory(memberId){

  if(!window.isChurchAdmin){
    alert("Only church admins can remove members from the directory.");
    return;
  }

  const member = members.find(m => m.id === memberId);
  const label = member
    ? (member.fields["Full Name"] || `${member.fields["First Name"] || ""} ${member.fields["Last Name"] || ""}`.trim() || "this member")
    : "this member";

  if(!confirm(`Remove "${label}" from the directory?\n\nThis cannot be undone.`)){
    return;
  }

  try{

    const { deleteDoc, doc } = await import(
      "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
    );

    const rawEmail = member && member.fields
      ? String(member.fields["Email"] || "").trim()
      : "";
    const allowUserId = rawEmail.toLowerCase();

    await deleteDoc(doc(db, "members", memberId));

    if(allowUserId){
      try{
        await deleteDoc(doc(db, "allowedUsers", allowUserId));
      }catch(allowErr){
        console.warn("Could not remove directory access (allowedUsers):", allowErr);
        alert(
          "Member was removed from the directory, but their login access could not be cleared automatically. Remove them from allowedUsers in Firestore if needed."
        );
        closeEditMember();
        await loadMembers();
        const memberSelectSheet = document.getElementById("memberSelectSheet");
        if(memberSelectSheet && memberSelectSheet.classList.contains("show")){
          renderMemberSelectContent();
        }
        return;
      }
    }

    alert("Member removed from the directory.");

    closeEditMember();
    await loadMembers();

    const memberSelectSheet = document.getElementById("memberSelectSheet");
    if(memberSelectSheet && memberSelectSheet.classList.contains("show")){
      renderMemberSelectContent();
    }

  }catch(err){
    console.error("Delete member failed:", err);
    alert("Could not remove this member. Check the console for details.");
  }

}

/* ================================= */
/* BUILD PENDING CHANGES YEAR VIEW   */
/* ================================= */
   
function buildYearView(changes){

  const box = document.getElementById("pendingChangesContent");

  window.pendingChangesData = changes;

  const years = {};

  changes.forEach(c => {
    if(!c.createdAt) return;

    const date = c.createdAt.toDate();
    const year = date.getFullYear();

    if(!years[year]) years[year] = [];
    years[year].push(c);
  });

  const pendingCount = changes.filter(c => c.status === "pending").length;

  const unresolvedRowLabel = pendingCount === 0
    ? "No pending changes"
    : "Unresolved pending changes";

  let html = `<h2>Pending Changes</h2>`;

  html += `
    <div onclick="buildUnresolvedList()"
      style="padding:14px;border-bottom:1px solid #e0e0e0;cursor:pointer;font-weight:600;background:#f5f7fa;">
      ${unresolvedRowLabel}
    </div>
  `;

  Object.keys(years)
    .sort((a,b)=>b-a)
    .forEach(year => {

      html += `
        <div onclick='buildMonthView(${year})'
          style="padding:14px;border-bottom:1px solid #eee;cursor:pointer;">
          ${year}
        </div>
      `;
    });

  box.innerHTML = html;

  openSheet("pendingChangesSheet");
}

/* ================================= */
/* BUILD PENDING CHANGES MONTH VIEW  */
/* ================================= */
   
function buildMonthView(year){

  const changes = window.pendingChangesData;

  const months = {};

  changes.forEach(c => {
    if(!c.createdAt) return;

    const d = c.createdAt.toDate();

    if(d.getFullYear() !== year) return;

    const month = d.getMonth();

    if(!months[month]) months[month] = [];
    months[month].push(c);
  });

  const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  let html = `<h2>${year}</h2>`;

  Object.keys(months)
    .sort((a,b)=>b-a)
    .forEach(m => {

      html += `
        <div onclick='buildDayList(${year}, ${m})'
          style="padding:14px;border-bottom:1px solid #eee;cursor:pointer;">
          ${monthNames[m]}
        </div>
      `;
    });

  document.getElementById("pendingChangesContent").innerHTML = html;
}

/* ================================= */
/* BUILD PENDING CHANGES DAY VIEW    */
/* ================================= */
   
function buildDayList(year, month){

  const changes = window.pendingChangesData;

  const filtered = changes
    .filter(c => {
      if(!c.createdAt) return false;
      const d = c.createdAt.toDate();
      return d.getFullYear() === year && d.getMonth() === month;
    })
    .sort((a,b)=>b.createdAt.seconds - a.createdAt.seconds);

  let html = `<h2>Changes</h2>`;

  filtered.forEach(c => {

    const d = c.createdAt.toDate();

    const label = d.toLocaleDateString("en-US", {
      month:"short",
      day:"numeric"
    });

    html += `
      <div style="padding:12px;border-bottom:1px solid #eee;">
        <strong>${label}</strong><br>
        ${c.submittedBy}
      </div>
    `;
  });

  document.getElementById("pendingChangesContent").innerHTML = html;
}

/* ================================= */
/* PENDING CHANGES — UNRESOLVED LIST */
/* ================================= */

function escapeHtml(s){

  if(s == null || s === "") return "";

  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");

}

function formatPendingDetailValue(v){

  if(v == null || v === "") return "—";

  return escapeHtml(v);

}

function restorePendingChangesYearView(){

  if(!window.pendingChangesData){
    return;
  }

  buildYearView(window.pendingChangesData);

}

function buildUnresolvedList(){

  const changes = window.pendingChangesData;

  const box = document.getElementById("pendingChangesContent");

  if(!changes){
    box.innerHTML = `
      <div onclick="restorePendingChangesYearView()"
        style="padding:12px;cursor:pointer;color:#2b5cff;border-bottom:1px solid #eee;">
        ← Back
      </div>
      <h2>Unresolved</h2>
      <p style="padding:14px;">No pending changes loaded.</p>
    `;
    return;
  }

  const filtered = changes.filter(c => c.status === "pending");

  filtered.sort((a,b)=>{

    const ta = a.createdAt && a.createdAt.toDate
      ? a.createdAt.toDate().getTime()
      : 0;

    const tb = b.createdAt && b.createdAt.toDate
      ? b.createdAt.toDate().getTime()
      : 0;

    return tb - ta;

  });

  let html = `
    <div onclick="restorePendingChangesYearView()"
      style="padding:12px;cursor:pointer;color:#2b5cff;border-bottom:1px solid #eee;">
      ← Back
    </div>
    <h2>Unresolved</h2>
  `;

  if(filtered.length === 0){

    html += `<p style="padding:14px;">No unresolved items — nothing is still pending.</p>`;
    box.innerHTML = html;
    return;

  }

  filtered.forEach(c => {

    const d = c.createdAt && c.createdAt.toDate ? c.createdAt.toDate() : null;

    const label = d
      ? d.toLocaleDateString("en-US", {
        month:"short",
        day:"numeric",
        year:"numeric"
      })
      : "—";

    html += `
      <div onclick="openUnresolvedPendingDetail('${c.id}')"
        style="padding:12px;border-bottom:1px solid #eee;cursor:pointer;">
        <strong>${escapeHtml(label)}</strong><br>
        ${escapeHtml(c.submittedBy || "")}
      </div>
    `;

  });

  box.innerHTML = html;

}

function mapChangesToMember(ch){

  const zipVal = ch.zip != null && ch.zip !== ""
    ? ch.zip
    : (ch.zipCode != null ? ch.zipCode : "");

  const ministryParts = [ch.ministry, ch.role].filter(Boolean);
  const ministry = ministryParts.length ? ministryParts.join(" · ") : "";

  const first = (ch.firstName || "").trim();
  const last = (ch.lastName || "").trim();

  return {
    firstName: first,
    lastName: last,
    fullName: ch.fullName || `${first} ${last}`.trim(),
    email: ch.email || "",
    phone: ch.phone || "",
    ministry,
    address: ch.address || "",
    city: ch.city || "",
    state: ch.state || "",
    zipCode: zipVal,
    birthday: ch.birthday || "",
    anniversary: ch.anniversary || "",
    household: ch.household || "",
    photo: ch.photoURL || ch.photo || "",
    lastUpdated: new Date().toISOString()
  };

}

async function refreshPendingChangesCache(){

  const { getDocs, collection } = await import(
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
  );

  const snapshot = await getDocs(collection(db, "pendingChanges"));

  const changes = snapshot.docs.map(doc => ({
    id: doc.id,
    ...doc.data()
  }));

  window.pendingChangesData = changes;

  return changes;

}

function openUnresolvedPendingDetail(pendingId){

  const list = window.pendingChangesData || [];
  const item = list.find(x => x.id === pendingId);

  if(!item){
    alert("That entry could not be found.");
    return;
  }

  const ch = item.changes || {};
  const created = item.createdAt && item.createdAt.toDate
    ? item.createdAt.toDate().toLocaleString()
    : "—";

  const isOnboarding = ch.onboarding === true;

  const photoURL = ch.photoURL || ch.photo;
  const safePhotoUrl = typeof photoURL === "string" && /^https:\/\//i.test(photoURL.trim())
    ? photoURL.trim()
    : "";

  const photoBlock = safePhotoUrl
    ? `<div style="margin:12px 0;text-align:center;">
        <p style="margin:0 0 8px;font-size:14px;"><strong>Profile photo</strong></p>
        <p style="margin:0 0 6px;font-size:12px;color:#666;">Click image to enlarge</p>
        <img id="pendingChangePhotoImg" src="${escapeHtml(safePhotoUrl)}" alt="Profile photo" referrerpolicy="no-referrer" loading="lazy"
          title="View full size"
          style="max-width:100%;max-height:240px;border-radius:8px;object-fit:cover;border:1px solid #eee;cursor:pointer;">
      </div>`
    : "";

  const rows = [
    ["Submitted by", item.submittedBy || "—"],
    ["Submitted at", created],
    ["Type", isOnboarding ? "New member (onboarding)" : "Profile update"],
    ...(item.memberId ? [["Member document ID", item.memberId]] : []),
    ["First name", ch.firstName],
    ["Last name", ch.lastName],
    ["Full name", ch.fullName],
    ["Email", ch.email],
    ["Phone", ch.phone],
    ["Ministry", ch.ministry],
    ["Role", ch.role],
    ["Address", ch.address],
    ["City", ch.city],
    ["State", ch.state],
    ["ZIP", ch.zip != null && ch.zip !== "" ? ch.zip : ch.zipCode],
    ["Birthday", ch.birthday],
    ["Anniversary", ch.anniversary]
  ];

  const body = photoBlock + rows.map(([label, val]) => `
    <p style="margin:0 0 10px;font-size:14px;line-height:1.4;">
      <strong>${escapeHtml(label)}</strong><br>
      <span style="color:#333;">${formatPendingDetailValue(val)}</span>
    </p>
  `).join("");

  const admin = window.isChurchAdmin;

  const buttons = admin
    ? `<div style="display:flex;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid #eee;flex-shrink:0;">
         <button type="button" id="pendingApproveBtn"
           style="flex:1;padding:12px;background:#2b5cff;color:white;border:none;border-radius:8px;font-size:15px;">
           Approve
         </button>
         <button type="button" id="pendingDenyBtn"
           style="flex:1;padding:12px;background:#eee;color:#111;border:none;border-radius:8px;font-size:15px;">
           Deny
         </button>
       </div>`
    : `<p style="color:#666;font-size:13px;margin-top:12px;">Only church admins can approve or deny.</p>`;

  const box = document.getElementById("pendingChangesContent");

  box.innerHTML = `
    <div onclick="buildUnresolvedList()"
      style="padding:12px;cursor:pointer;color:#2b5cff;border-bottom:1px solid #eee;">
      ← Back to Unresolved
    </div>
    <h2 style="margin:12px 0;">Review pending change</h2>
    <div style="padding:4px 0 8px;max-height:50vh;overflow-y:auto;">
      ${body}
    </div>
    ${buttons}
  `;

  if(admin){

    document.getElementById("pendingApproveBtn").onclick = () => {
      approvePendingChange(pendingId);
    };

    document.getElementById("pendingDenyBtn").onclick = () => {
      denyPendingChange(pendingId);
    };

  }

  if(safePhotoUrl){

    const pendingImg = document.getElementById("pendingChangePhotoImg");

    if(pendingImg){
      pendingImg.onclick = (e) => {
        e.stopPropagation();
        openPhoto(safePhotoUrl);
      };
    }

  }

}

async function approvePendingChange(pendingId){

  if(!window.isChurchAdmin){
    alert("Only church admins can approve changes.");
    return;
  }

  if(!confirm("Approve this change? The directory will update for everyone.")){
    return;
  }

  try {

    const { doc, getDoc, updateDoc, addDoc, collection, deleteDoc } = await import(
      "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
    );

    const changeRef = doc(db, "pendingChanges", pendingId);
    const snap = await getDoc(changeRef);

    if(!snap.exists()){
      alert("This pending change is no longer in Firestore.");
      await refreshPendingChangesCache();
      buildUnresolvedList();
      return;
    }

    const row = snap.data();
    const ch = row.changes || {};

    const memberPayload = mapChangesToMember(ch);

    if(ch.onboarding){

      await addDoc(collection(db, "members"), {
        ...memberPayload,
        createdAt: new Date().toISOString()
      });

    }else if(row.memberId){

      await updateDoc(doc(db, "members", row.memberId), memberPayload);

    }else{

      alert("This entry is missing a member reference and is not marked as onboarding. It cannot be approved automatically.");
      return;

    }

    await deleteDoc(changeRef);

    const memberEmail = (ch.email || "").trim();
    const firstName = (ch.firstName || "").trim() || "there";

    const emailBody =
      `Hello ${firstName},\n\n` +
      "The changes you requested for your member profile in the Impact Church Directory have been approved.";

    await refreshPendingChangesCache();
    buildUnresolvedList();
    await loadMembers();

    alert("Approved. The directory has been updated.");

    if(memberEmail){
      openAdminEmailModal({
        to: memberEmail,
        subject: ADMIN_EMAIL_SUBJECT_APPROVED,
        body: emailBody,
        title: "Profile approved — notify the member"
      });
    }

  }catch(err){
    console.error("Approve failed:", err);
    alert("Could not approve this change. Check the console for details.");
  }

}

/* ================================= */
/* BUILD DIRECTORY                   */
/* ================================= */

function getCurrentMemberSearchQuery(){

const el = document.getElementById("memberSearch")

return el ? el.value.trim().toLowerCase() : ""

}

function getMemberNameParts(record){

const f = record.fields || {}

return{
first:String(f["First Name"] || "").trim().toLowerCase(),
last:String(f["Last Name"] || "").trim().toLowerCase()
}

}

function memberMatchesNamePrefix(record, q){

if(!q) return true

const { first, last } = getMemberNameParts(record)

return first.startsWith(q) || last.startsWith(q)

}

function compareMembersDefaultSort(a, b){

const aLast = a.fields["Last Name"] || ""
const bLast = b.fields["Last Name"] || ""

const aFirst = a.fields["First Name"] || ""
const bFirst = b.fields["First Name"] || ""

if(aLast < bLast) return -1
if(aLast > bLast) return 1

return aFirst.localeCompare(bFirst)

}

function compareMembersSearchSort(a, b, q){

const A = getMemberNameParts(a)
const B = getMemberNameParts(b)

const aFirstHit = A.first.startsWith(q)
const bFirstHit = B.first.startsWith(q)

if(aFirstHit !== bFirstHit) return aFirstHit ? -1 : 1

const c1 = A.first.localeCompare(B.first)

if(c1 !== 0) return c1

return A.last.localeCompare(B.last)

}

function buildDirectory(searchQuery){

const directory = document.getElementById("directory")

directory.innerHTML = ""

const q = String(searchQuery || "").trim().toLowerCase()

let list = members.slice()

if(q){

list = list.filter(m => memberMatchesNamePrefix(m, q))
list.sort((a, b) => compareMembersSearchSort(a, b, q))

}else{

list.sort(compareMembersDefaultSort)

}

list.forEach(record=>{

const f = record.fields

const photo = f.Photo || "images/default.jpg"
const name = f["Full Name"] || ""
const ministry = f.Ministry || ""
const phone = formatPhone(f["Phone Number"])

const household = f.Household || ""
const updated = formatDate(f["Last Updated"])

card.className="card"

/* ================================= */
/* FORMAT DATE                       */
/* ================================= */
   
/* Parses full dates (e.g. ISO) or month-day text without a year (e.g. "Feb 25"). */
function parseMonthDayOrFullDate(dateString){

if(!dateString) return null

const t = String(dateString).trim()

if(!t) return null

if(/^\d{4}-\d{2}-\d{2}/.test(t)){

const d = new Date(t.length === 10 ? t + "T12:00:00" : t)

return isNaN(d.getTime()) ? null : d

}

let d = new Date(t)

if(!isNaN(d.getTime())) return d

d = new Date(t + (/,/.test(t) ? "" : ", 2000"))

return isNaN(d.getTime()) ? null : d

}

function formatShortDate(dateString){

if(!dateString) return ""

const d = parseMonthDayOrFullDate(dateString)

if(!d) return String(dateString).trim()

const months = [
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
]

return months[d.getMonth()] + " " + d.getDate()

}

/* ================================= */
/* SHEET CLOSE ANIMATION             */
/* ================================= */

let startY = 0
let currentY = 0
let startTime = 0
let dragging = false

const sheet = document.querySelector(".profile-box")

sheet.addEventListener("touchstart",(e)=>{

// ONLY allow drag if scrolled to top
if(sheet.scrollTop > 0){
dragging = false
return
}

startY = e.touches[0].clientY
startTime = Date.now()
dragging = true

})

sheet.addEventListener("touchmove",(e)=>{

if(!dragging) return

currentY = e.touches[0].clientY

let diff = currentY - startY

/* Only drag downward */
if(diff > 0){

/* drag resistance */
let resistance = diff * 0.7
sheet.style.transform = `translateY(${resistance}px)`

}

})

sheet.addEventListener("touchend",()=>{

dragging = false

const distance = currentY - startY
const time = Date.now() - startTime
const velocity = distance / time

if(distance > 120 || velocity > 0.5){
closeProfile()
}else{
sheet.style.transform = "translateY(0)"
}

})

/* ================================= */
/* DATA FORMATTING                   */
/* ================================= */

function formatPhone(phone){

if(!phone) return ""

const digits = phone.replace(/\D/g,'')

if(digits.length !== 10) return phone

return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`
}

function formatDate(dateString){

if(!dateString) return ""

const d = new Date(dateString)

return d.toLocaleDateString("en-US",{
year:"numeric",
month:"long",
day:"numeric"
})

}

function formatMonthDay(dateString){

if(!dateString) return ""

const d = parseMonthDayOrFullDate(dateString)

if(!d) return String(dateString).trim()

return d.toLocaleDateString("en-US",{
month:"short",
day:"numeric"
})

}
