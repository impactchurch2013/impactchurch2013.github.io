<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Church Directory</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#f7f8fb,#e9edf5);
margin:0;
padding:30px 20px;
min-height:100vh;
}

h1{
text-align:center;
margin-bottom:50px;
font-size:28px;
letter-spacing:.5px;
color:#333;
}

.directory{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:24px;
max-width:1200px;
margin:auto;
}

.card{
position:relative;
cursor:pointer;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,.12);
transition:transform .15s ease, box-shadow .15s ease;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 12px 28px rgba(0,0,0,.18);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
display:block;
}

.card-info{
position:absolute;
bottom:0;
right:0;
background:rgba(0,0,0,.75);
color:white;
padding:8px 12px;
text-align:right;
border-top-left-radius:8px;
}

.card-info h3{
margin:0;
font-size:16px;
}

.card-info p{
margin:2px 0 0 0;
font-size:13px;
opacity:.9;
}

.profile{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
}

.profile-box{
background:white;
padding:30px;
border-radius:12px;
width:380px;
text-align:center;
}

.profile-box img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

.close{
margin-top:15px;
cursor:pointer;
color:blue;
}

.photo-viewer{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.photo-viewer img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

@media (max-width: 600px){

@media (max-width:600px){

body{
padding:0;
}

h1{
margin:20px 0 20px 0;
}

.directory{
grid-template-columns:1fr;
gap:12px;
max-width:100%;
}

.card{
border-radius:0;
box-shadow:none;
}

.card img{
height:260px;
}

.card-info{
right:0;
bottom:0;
border-radius:0;
padding:10px 14px;
}

.card-info h3{
font-size:18px;
}

.card-info p{
font-size:14px;
}

}

}

@media (max-width:600px){

.profile{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:white;
display:none;
overflow-y:auto;
z-index:1000;
}

.profile-box{
width:100%;
max-width:none;
height:auto;
border-radius:0;
padding:25px;
text-align:center;
box-shadow:none;
}

.profile-box img{
width:160px;
height:160px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
}

.close{
font-size:18px;
margin-top:25px;
}

}
  
</style>
</head>

<body>

<h1>Church Directory</h1>

<div class="directory" id="directory"></div>

<div class="profile" id="profile">
<div class="profile-box" id="profileContent"></div>
</div>

<div id="photoViewer" class="photo-viewer" onclick="closePhoto()">
<img id="photoViewerImg">
</div>

<script>

async function loadMembers(){

const response = await fetch("/.netlify/functions/members")
const data = await response.json()

const directory = document.getElementById("directory")

data.records.sort((a,b)=>{

const aLast = a.fields["Last Name"] || ""
const bLast = b.fields["Last Name"] || ""

const aFirst = a.fields["First Name"] || ""
const bFirst = b.fields["First Name"] || ""

if(aLast < bLast) return -1
if(aLast > bLast) return 1

return aFirst.localeCompare(bFirst)

})
  
data.records.forEach(record=>{

const f = record.fields

const photo = f.Photo?.[0]?.url || ""
const name = f["Full Name"] || ""
const ministry = f.Ministry || ""
const phone = formatPhone(f["Phone Number"])
const email = f.Email || ""

const address =
`${f.Address || ""}<br>
${f.City || ""}, ${f.State || ""} ${f["Zip Code"] || ""}`

const birthday = formatMonthDay(f.Birthday)
const anniversary = formatMonthDay(f.Anniversary)
const household = f.Household || ""
const updated = formatDate(f["Last Updated"])

const card = document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${photo}">
<div class="card-info">
<h3>${name}</h3>
${ministry ? `<p>${ministry}</p>` : ""}
</div>
`

card.onclick=()=>showProfile(name,photo,ministry,phone,email,address,birthday,anniversary,household,updated)

directory.appendChild(card)

})

}

function showProfile(name,photo,ministry,phone,email,address,birthday,anniversary,household,updated){

const box = document.getElementById("profileContent")

box.innerHTML=`

<img src="${photo}" onclick="openPhoto('${photo}')" style="cursor:pointer">
<h2>${name}</h2>

${ministry ? `<p><strong>${ministry}</strong></p>` : ""}

<p><a href="tel:${phone}">${phone}</a></p>
<p>${email}</p>
<p>${address}</p>

${birthday ? `<p><strong>Birthday:</strong> ${birthday}</p>` : ""}

${anniversary ? `<p><strong>Anniversary:</strong> ${anniversary}</p>` : ""}

${household ? `<p><strong>Household:</strong> <span style="color:blue;cursor:pointer">${household}</span></p>` : ""}

${updated ? `<p style="font-size:12px;color:#666">Updated ${updated}</p>` : ""}

<div class="close" onclick="closeProfile()">Close</div>

`

document.getElementById("profile").style.display="flex"

}

function closeProfile(){
document.getElementById("profile").style.display="none"
}

function openPhoto(photo){
const viewer = document.getElementById("photoViewer")
const img = document.getElementById("photoViewerImg")

img.src = photo
viewer.style.display = "flex"
}

function closePhoto(){
document.getElementById("photoViewer").style.display = "none"
}

function formatPhone(phone){

if(!phone) return ""

const digits = phone.replace(/\D/g,'')

if(digits.length !== 10) return phone

return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`
}

function formatDate(dateString){

if(!dateString) return ""

const d = new Date(dateString)

return d.toLocaleDateString("en-US",{
year:"numeric",
month:"long",
day:"numeric"
})

}

function formatMonthDay(dateString){

if(!dateString) return ""

const d = new Date(dateString)

return d.toLocaleDateString("en-US",{
month:"long",
day:"numeric"
})

}

loadMembers()

</script>

</body>
</html>
